# This is a Databricks asset bundle definition for assessment1.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: assessment1
  uuid: 44a7212d-1f47-4498-b15d-5e4790bc8b12

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: http://127.0.0.1:7073
    variables:
      catalog: dev1
      schema: dev
  prod:
    mode: production
    workspace:
      host: http://127.0.0.1:7073
      # We explicitly deploy to /Workspace/Users/polasaipranav@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/polasaipranav@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dev1
      schema: prod
    permissions:
      - user_name: polasaipranav@gmail.com
        level: CAN_MANAGE
